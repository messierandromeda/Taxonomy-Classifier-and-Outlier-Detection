services:
  biodiv-api:
    build: .
    container_name: biodiv-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama-service:11434
      - OLLAMA_MODEL=llama3.2:3b
    volumes:
      - .:/app
    depends_on:
      - ollama-service
    restart: unless-stopped

  ollama-service:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_storage:
